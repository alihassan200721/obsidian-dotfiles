# ~/.config/kitty/kitty.conf — Obsidian Amber Theme
# Matched to Waybar: dark obsidian glass · desert amber · faint violet
#
#  Main glass     #0f0f0f
#  Panels         #1a1a1a
#  Main text      #e5e5e5
#  Secondary      #a0a0a0
#  Icons/muted    #b9b9b9
#  Amber accent   #d4a373
#  Violet accent  #7a5cff
#  Inactive       #5e5e5e
#  Empty/dark     #404040

background_opacity          0.82
font_size                   14.0
font_family                 JetBrains Mono
#shell_integration no-cursor
cursor_trail 10
cursor_trail_start_threshold 0
cursor_trail_decay 0.01 0.05
cursor_shape beam
cursor_beam_thickness       1.5
cursor_blink_interval       0.5
cursor_stop_blinking_after  0



foreground              #b9b9b9
background              #0f0f0f
selection_foreground    #0f0f0f
selection_background    #d4a373
cursor                  #d4a373
cursor_text_color       #0f0f0f
url_color               #7a5cff

active_border_color     #d4a373
inactive_border_color   #2a2a2a
bell_border_color       #7a5cff

active_tab_foreground   #0f0f0f
active_tab_background   #d4a373
inactive_tab_foreground #5e5e5e
inactive_tab_background #1a1a1a

# ── 16-colour palette ─────────────────────────────────────────────
# Black
color0   #0f0f0f
color8   #404040

# Red  (kept functional — errors, warnings)
color1   #c0504a
color9   #d06860

# Green  (success, diffs)
color2   #5a8a5a
color10  #78a878

# Yellow → Amber (matches primary accent)
color3   #c59a6a
color11  #d4a373

# Blue → muted teal (readable, not jarring)
color4   #4a7888
color12  #6898a8

# Magenta → Violet (secondary accent, used lightly)
color5   #5a48c0
color13  #7a5cff

# Cyan → warm neutral blue-grey
color6   #5a7888
color14  #7898a8

# White
color7   #b9b9b9
color15  #e5e5e5


