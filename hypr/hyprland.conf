# Monitor
monitor=,preferred,auto,1

# Programs
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# Autostart
exec-once = waybar
exec-once = nm-applet
exec-once = blueman-applet
exec-once = polkit-gnome-authentication-agent-1
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/obsidian/Pictures/wallpapernew.png

# Environment
env = XCURSOR_SIZE,24

# Input
input {
    kb_layout = us
    follow_mouse = 1
}

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

# Decoration
decoration {
    rounding = 8
}

# Animations
animations {
    enabled = yes
}

# Keybinds
$mainMod = SUPER

# Core
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, dolphin
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating

# App shortcuts
bind = $mainMod, B, exec, firefox
bind = $mainMod, O, exec, obs
bind = $mainMod, N, exec, blender

# Resize submap (Super+R to enter, Escape or Super+R to exit)
bind = $mainMod, R, submap, resize
submap = resize
    binde = , right, resizeactive,  30 0
    binde = , left,  resizeactive, -30 0
    binde = , up,    resizeactive,  0 -30
    binde = , down,  resizeactive,  0  30
    binde = , l, resizeactive,  30 0
    binde = , h, resizeactive, -30 0
    binde = , k, resizeactive,  0 -30
    binde = , j, resizeactive,  0  30
    bind  = , escape,    submap, reset
    bind  = $mainMod, R, submap, reset
submap = reset

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Minimize/unminimize
bind = $mainMod, M,       togglespecialworkspace, minimized
bind = $mainMod SHIFT, M, movetoworkspacesilent,  special:minimized

# Mouse move & resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus - arrow keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move focus - vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move tiled windows - Super+Ctrl+hjkl
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, j, movewindow, d

# Resize active window (tiled & floating) - Super+Shift+hjkl
binde = $mainMod SHIFT, h, resizeactive, -30 0
binde = $mainMod SHIFT, l, resizeactive,  30 0
binde = $mainMod SHIFT, k, resizeactive,  0 -30
binde = $mainMod SHIFT, j, resizeactive,  0  30

# Screenshot
bind = , PRINT, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%s).png

# Power menu
bind = $mainMod SHIFT, E, exec, wlogout --protocol layer-shell -C ~/.config/wlogout/style.css

# Brightness
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Volume
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

#killall xwaylandvideobridge
exec-once = sleep 3 && killall xwaylandvideobridge

#waybar appear and disappear 
exec-once = ~/.config/waybar/scripts/waybar-autohide.sh
bind = SUPER, W, exec, ~/.config/waybar/scripts/waybar-toggle.sh
